name: Bug report
description: Report a reproducible bug in a brick or in the marketplace tooling
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for filling this out — it helps triage.
  - type: input
    id: brick
    attributes:
      label: Affected brick (or tooling)
      description: 'Brick name (e.g. `focus-indexer`) or tooling area (`catalog generator`, `CI`, `schema`).'
      placeholder: 'focus-indexer'
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Brick / marketplace version
      placeholder: '0.1.0'
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce the bug.
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Windows 11
        - Windows 10
        - macOS 14
        - macOS 13
        - Ubuntu 22.04
        - Ubuntu 24.04
        - Other Linux
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 'v22.x'
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Relevant logs, stack traces, or screenshots.
