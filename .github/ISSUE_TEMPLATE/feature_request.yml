name: Feature request
description: Propose a new feature for an existing brick or for marketplace tooling
labels: [feature]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the problem or user need. No solution here.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: impact
    attributes:
      label: Impact
      options:
        - label: Breaking change (major bump)
        - label: Existing brick modification
        - label: Catalog schema change
        - label: CI / tooling
        - label: Documentation
  - type: checkboxes
    id: adr
    attributes:
      label: ADR
      options:
        - label: This feature requires an ADR (architecture decision)
