name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          show_full_output: "true"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request as a senior engineer.

            Focus areas (in order of priority):
            1. **Correctness** — does the code do what the PR description claims? Any obvious bugs, race conditions, or broken edge cases?
            2. **Security** — input validation, injection risks, unsafe shell/eval, secret leaks, unsafe deps.
            3. **Test coverage** — are new code paths tested? Any missing edge-case tests?
            4. **TypeScript strictness** — no `any`, proper types, `node:` protocol for stdlib imports.
            5. **Consistency** — matches surrounding patterns, naming conventions, file layout.
            6. **Docs** — public API changes reflected in README/AGENTS.md.

            Be terse and concrete. If the PR is clean, say "LGTM" via `gh pr comment` and end. Do not hedge.
            Reject `--no-verify` and any bypasses of CI gates in the code.

            **Posting feedback:**
            - Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) for line-specific issues.
            - Use `gh pr comment` for the top-level verdict (LGTM / requesting changes / overall summary).
            - Only post via these GitHub tools — do not return review text as a chat message.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),Read,Grep,Glob"
