name: Dev Publish

on:
  # Auto-trigger temporarily disabled to stop 68-brick publish spam on every push.
  # Re-enabled in ci/dev-publish-only-modified once per-brick git-diff logic lands.
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: dev-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-dev:
    name: Publish @focusmcp/* bricks@dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: '@focusmcp'
      - run: pnpm install --frozen-lockfile
      - name: Compute dev number
        id: devnum
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          DEV_NUM=$(git rev-list --count ${LAST_TAG}..HEAD)
          echo "num=${DEV_NUM}" >> "$GITHUB_OUTPUT"
          echo "Dev number: ${DEV_NUM}"
      - name: Set per-brick dev versions
        env:
          DEV_NUM: ${{ steps.devnum.outputs.num }}
        run: |
          for dir in bricks/*/; do
            if [ -f "${dir}package.json" ]; then
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('${dir}package.json', 'utf-8'));
                if (pkg.private === true) process.exit(0);
                const base = pkg.version.split('-')[0];
                pkg.version = base + '-dev.' + process.env.DEV_NUM;
                fs.writeFileSync('${dir}package.json', JSON.stringify(pkg, null, 4) + '\n');
                console.log('  -> ' + pkg.name + '@' + pkg.version);
              "
            fi
          done
      - name: Build all bricks
        run: pnpm build
      - run: pnpm build:catalog
      - name: Publish all bricks with dev tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in bricks/*/; do
            if [ -f "${dir}package.json" ]; then
              PRIVATE=$(node -e "console.log(require('./${dir}package.json').private)")
              if [ "$PRIVATE" != "true" ]; then
                NAME=$(node -e "console.log(require('./${dir}package.json').name)")
                echo "Publishing ${NAME}..."
                cd "$dir"
                npm publish --tag dev --access public 2>&1 || echo "  -> skipped"
                cd ../..
              fi
            fi
          done
