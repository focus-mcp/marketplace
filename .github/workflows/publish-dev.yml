name: Publish to GitHub Packages (dev)

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish @focus-mcp/* to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@focus-mcp'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:catalog
      - run: |
          for dir in bricks/*/; do
            name=$(node -e "console.log(require('./${dir}package.json').name)")
            private=$(node -e "console.log(require('./${dir}package.json').private)")
            if [ "$private" = "false" ]; then
              echo "Publishing $name..."
              cd "$dir"
              npm publish --access public 2>&1 || echo "  → skipped (already published or error)"
              cd ../..
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
