#
# Release workflow — on push to main:
#   1. Runs Changesets (creates tags `<brick-name>@x.y.z` for bumped bricks + GitHub Releases).
#   2. Rebuilds the catalog and publishes it + the JSON schemas to the `gh-pages` branch.
# No npm publish at MVP (bricks are distributed via GitHub Releases tarballs).

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write
  pages: write

concurrency: release-${{ github.ref }}

jobs:
  release:
    name: Release via Changesets
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version
          commit: 'chore(release): version bricks'
          title: 'chore(release): version bricks'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  catalog:
    name: Publish catalog to GitHub Pages
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:catalog
      - name: Assemble publish dir
        run: |
          mkdir -p publish/schemas
          cp dist/catalog.json publish/catalog.json
          cp -r schemas/* publish/schemas/
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          publish_branch: gh-pages
          keep_files: false
          commit_message: 'chore(catalog): publish ${{ github.sha }}'
