name: Stable Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write

concurrency:
  group: stable-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-stable:
    name: Publish @focus-mcp/brick-* with @latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: '@focus-mcp'
      - run: pnpm install --frozen-lockfile
      - name: Build all bricks
        run: pnpm build
      - run: pnpm build:catalog
      - name: Commit regenerated catalog via PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet publish/catalog.json; then
            echo "catalog.json unchanged — skipping PR"
          else
            SHA=$(git rev-parse --short HEAD)
            BRANCH="bot/catalog-update-${SHA}"
            git checkout -b "${BRANCH}"
            git add publish/catalog.json
            git commit -m "chore(catalog): regenerate after stable publish ${SHA} [skip ci]"
            git push origin "${BRANCH}"
            gh pr create \
              --repo focus-mcp/marketplace \
              --base main \
              --head "${BRANCH}" \
              --title "chore(catalog): regenerate after stable publish ${SHA}" \
              --body "Auto-generated by the Stable Publish workflow. Keeps publish/catalog.json in sync with freshly published brick versions." \
              2>/dev/null || true
            echo "Opened catalog-update PR from ${BRANCH}"
          fi
      - name: Publish all bricks with latest tag
        run: |
          for dir in bricks/*/; do
            if [ -f "${dir}package.json" ]; then
              NAME=$(node -e "console.log(require('./${dir}package.json').name)")
              VERSION=$(node -e "console.log(require('./${dir}package.json').version)")
              echo "Publishing ${NAME}@${VERSION}..."
              cd "$dir"
              npm publish --access public 2>&1 || echo "  → skipped (already published?)"
              cd ../..
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
