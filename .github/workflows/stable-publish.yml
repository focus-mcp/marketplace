name: Stable Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: stable-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-stable:
    name: Publish @focus-mcp/brick-* with @latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: '@focus-mcp'
      - run: pnpm install --frozen-lockfile
      - name: Build all bricks
        run: pnpm build
      - run: pnpm build:catalog
      - name: Publish all bricks with latest tag
        run: |
          for dir in bricks/*/; do
            if [ -f "${dir}package.json" ]; then
              NAME=$(node -e "console.log(require('./${dir}package.json').name)")
              VERSION=$(node -e "console.log(require('./${dir}package.json').version)")
              echo "Publishing ${NAME}@${VERSION}..."
              cd "$dir"
              npm publish --access public 2>&1 || echo "  → skipped (already published?)"
              cd ../..
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
