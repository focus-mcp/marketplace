name: Stable Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write

concurrency:
  group: stable-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-stable:
    name: Publish @focus-mcp/brick-* with @latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: '@focus-mcp'
      - run: pnpm install --frozen-lockfile
      # catalog is always regenerated — it reads source package.json files and needs no dist
      - run: pnpm build:catalog
      - name: Commit regenerated catalog via PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet publish/catalog.json; then
            echo "catalog.json unchanged — skipping PR"
          else
            SHA=$(git rev-parse --short HEAD)
            BRANCH="bot/catalog-update-${SHA}"
            git checkout -b "${BRANCH}"
            git add publish/catalog.json
            git commit -m "chore(catalog): regenerate after stable publish ${SHA} [skip ci]"
            git push origin "${BRANCH}"
            gh pr create \
              --repo focus-mcp/marketplace \
              --base main \
              --head "${BRANCH}" \
              --title "chore(catalog): regenerate after stable publish ${SHA}" \
              --body "Auto-generated by the Stable Publish workflow. Keeps publish/catalog.json in sync with freshly published brick versions." \
              2>/dev/null || true
            echo "Opened catalog-update PR from ${BRANCH}"
          fi
      # Strategy: diff local package.json version vs npm registry @latest.
      # Only bricks whose version has changed are built then published.
      # Bricks already at the latest version on npm are skipped entirely — no build, no publish.
      # Follow-up idea: replace `npm view` loop with `pnpm changeset status --output`
      # for intent-based (changeset-driven) filtering instead of state-based (registry diff).
      - name: Build and publish only bumped bricks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          # Build a name->dir reverse map up front
          declare -A DIRS
          for dir in bricks/*/; do
            [ -f "${dir}package.json" ] || continue
            NAME=$(node -e "console.log(require('./${dir}package.json').name)")
            DIRS["$NAME"]="$dir"
          done

          # Identify bricks whose local version differs from npm @latest
          bumped=()
          for NAME in "${!DIRS[@]}"; do
            dir="${DIRS[$NAME]}"
            LOCAL=$(node -e "console.log(require('./${dir}package.json').version)")
            # If the package doesn't exist on npm yet, `npm view` exits non-zero -> treat as new (bumped)
            NPM_VER=$(npm view "$NAME" version 2>/dev/null || echo "none")
            if [ "$LOCAL" != "$NPM_VER" ]; then
              echo "  -> will build/publish: $NAME ($NPM_VER -> $LOCAL)"
              bumped+=("$NAME")
            else
              echo "  skip: $NAME already at $LOCAL"
            fi
          done

          if [ ${#bumped[@]} -eq 0 ]; then
            echo "Nothing to publish -- all bricks are already at their current version on npm."
            exit 0
          fi

          # Build only the bumped bricks (pnpm --filter accepts multiple --filter flags)
          FILTERS=()
          for NAME in "${bumped[@]}"; do
            FILTERS+=(--filter "$NAME")
          done
          pnpm "${FILTERS[@]}" run build

          # Publish each bumped brick
          for NAME in "${bumped[@]}"; do
            dir="${DIRS[$NAME]}"
            echo "Publishing $NAME from $dir..."
            (cd "$dir" && npm publish --access public)
          done
