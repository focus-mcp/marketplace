name: dbt_score/happy
tool: dbt_score
description: >
  Sequenced: create debate then score both positions. Verifies ranking array with 2 entries.
input:
  debateId: "<from dbt_debate>"
  scores:
    - role: "advocate"
      relevance: 8
      evidence: 7
      feasibility: 6
    - role: "skeptic"
      relevance: 7
      evidence: 8
      feasibility: 9
tags: [happy, stateful, sequenced]
