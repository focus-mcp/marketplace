# Gitleaks config — extends default rules, allowlist for known false-positives

title = "FocusMCP marketplace gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Allowlisted paths and example tokens in docs"
paths = [
  '''pnpm-lock\.yaml''',
  '''.*\.test\.ts''',
  '''.*\.spec\.ts''',
  '''schemas/examples/.*''',
  '''docs/.*''',
]
regexes = [
  '''(EXAMPLE|FAKE|DUMMY|TEST)_TOKEN''',
]
