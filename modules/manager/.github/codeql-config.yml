name: CodeQL config for FocusMCP cli-manager

queries:
  - uses: security-and-quality

paths:
  - src/**/*.ts

paths-ignore:
  - '**/node_modules'
  - '**/.svelte-kit'
  - '**/build'
  - '**/dist'
  - '**/*.svelte'
  - '**/*.test.ts'
  - '**/*.spec.ts'
